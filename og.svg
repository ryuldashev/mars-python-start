<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <radialGradient id="g1" cx="15%" cy="10%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="85%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="33%" stop-color="#a855f7"/>
      <stop offset="66%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <rect x="0" y="0" width="1200" height="4" fill="url(#rainbow)"/>

  <!-- Mars badge -->
  <rect x="80" y="80" width="220" height="36" rx="18" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-opacity="0.5"/>
  <circle cx="100" cy="98" r="5" fill="#ef4444"/>
  <text x="116" y="103" fill="#fecaca" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="2">MARS IT SCHOOL</text>

  <!-- Title -->
  <text x="80" y="200" fill="white" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="-1">Python. Как начать.</text>

  <!-- Subtitle -->
  <text x="80" y="260" fill="#a1a1c7" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="26">
    <tspan>Проверенные материалы, квиз и план первой недели.</tspan>
  </text>
  <text x="80" y="296" fill="#a1a1c7" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="26">
    <tspan>Бесплатный гид от методистов Mars IT School.</tspan>
  </text>

  <!-- Mini tiles -->
  <g transform="translate(80, 360)">
    <!-- Course tile -->
    <rect x="0" y="0" width="160" height="100" rx="14" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.3"/>
    <text x="18" y="40" font-size="28">🎓</text>
    <text x="18" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Курсы</text>
    <text x="18" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">3 варианта</text>

    <!-- Book tile -->
    <rect x="176" y="0" width="160" height="100" rx="14" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="194" y="40" font-size="28">📚</text>
    <text x="194" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Книги</text>
    <text x="194" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">3 варианта</text>

    <!-- Video tile -->
    <rect x="352" y="0" width="160" height="100" rx="14" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.3"/>
    <text x="370" y="40" font-size="28">🎬</text>
    <text x="370" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Видео</text>
    <text x="370" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">3 варианта</text>

    <!-- Game tile -->
    <rect x="528" y="0" width="160" height="100" rx="14" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.3"/>
    <text x="546" y="40" font-size="28">🎮</text>
    <text x="546" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Игры</text>
    <text x="546" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">3 варианта</text>

    <!-- Build tile -->
    <rect x="704" y="0" width="160" height="100" rx="14" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.3"/>
    <text x="722" y="40" font-size="28">🛠</text>
    <text x="722" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Проекты</text>
    <text x="722" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">4 варианта</text>

    <!-- Sandbox tile -->
    <rect x="880" y="0" width="160" height="100" rx="14" fill="#ec4899" fill-opacity="0.12" stroke="#ec4899" stroke-opacity="0.3"/>
    <text x="898" y="40" font-size="28">🧪</text>
    <text x="898" y="70" fill="white" font-family="system-ui" font-size="14" font-weight="600">Песочницы</text>
    <text x="898" y="86" fill="#a1a1c7" font-family="system-ui" font-size="11">4 варианта</text>
  </g>

  <!-- URL -->
  <text x="80" y="550" fill="#6b6b8d" font-family="SF Mono, Menlo, monospace" font-size="16">python.marsit.uz</text>

  <!-- Bottom rainbow -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#rainbow)"/>
</svg>
